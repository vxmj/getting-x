name: 构建并推送 Docker 镜像

on:
  # 1. 设置触发器：当 'main' 分支有推送（push）时触发
  push:
    branches:
      - main

# 全局环境变量：强制 Actions 使用 Node.js 24 运行，以消除 Node 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest # 2. 使用最新的 Ubuntu 运行环境
    
    # 3. 授予 Job 写入 GitHub Packages (GHCR) 的权限
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 签出代码
      - name: 签出代码
        uses: actions/checkout@v4 # 如果此行仍有警告，可尝试修改为最新大版本如 @v5 或 @v6

      # 2. 登录到 GitHub 容器镜像库 (GHCR)
      - name: 登录到 GHCR
        uses: docker/login-action@v4 # 从 v3 升级到 v4 (原生支持 Node 24)
        with:
          registry: ghcr.io
          username: ${{ github.actor }} 
          password: ${{ secrets.GITHUB_TOKEN }} 

      # 3. 构建并推送 Docker 镜像
      - name: 构建并推送
        uses: docker/build-push-action@v7 # 从 v5 升级到 v7 (原生支持 Node 24)
        with:
          context: . 
          push: true 
          tags: ghcr.io/${{ github.repository }}:latest
